<!DOCTYPE html>
<!--[if lt IE 7]>

<!--[if IE 7]>
<html class="no-js lt-ie9 lt-ie8" lang=""> <![endif]-->

<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no">
    <title>{{ block "title" . }}{{- .Title -}}{{ end }} | TiDB Planet</title>
    {{- partial "head/ga" . -}}
    {{- partial "head/meta-seo" . -}}
    {{- partial "head/preload-css" (dict "href" "/css/tidb-planet.css") -}}
</head>

<body class="welcome-page">
    {{- partial "tidb-planet/nav" . -}}
    {{- partial "tidb-planet/modal" (dict "type" "video") -}}
    {{- partial "tidb-planet/space" . -}}

    <div class="tidb-planet">
        <div class="element-flag-list"></div>
        <div class="element-rocket-list"><a class="block-link" href="/tidb-planet/release-note/"></a></div>
        <div class="element-radar-list"></div>
        <div class="element-dorm2-list"><a class="block-link" href="/tidb-planet/village/"></a></div>
        <div class="element-telescope-list"></div>
        <div class="element-player-list"><a class="block-link" href="/tidb-planet/milestones/"></a></div>
        <div class="element-ufo-list"></div>
        <div class="element-rider-list"><a class="block-link" href="/tidb-planet/become-a-contributor/"></a></div>
        <div class="element-astro-list"></div>
        <div class="element-astronaut-list"><a class="block-link" href="/tidb-planet/user/"></a></div>
        <div class="element-robot-list"><a class="block-link" href="/tidb-planet/robot/"></a></div>
    </div>

    <script src="https://download.pingcap.com/js/jquery.min.js"></script>
    <script src='https://cdn.jsdelivr.net/g/lodash@4(lodash.min.js+lodash.fp.min.js)'></script>
    <script src="/js/tidb_planet.js"></script>
</body>

</html>
